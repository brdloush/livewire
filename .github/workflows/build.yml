name: Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Leiningen and Babashka
        uses: DeLaGuardo/setup-clojure@13
        with:
          lein: latest
          bb: latest

      - name: Build and install
        run: bb clean-install
